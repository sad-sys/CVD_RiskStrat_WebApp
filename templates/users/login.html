{% extends 'base.html' %}

{% block content %}

{% include 'users/disclaimer.html' %}
<section id="login-section" class="login-container">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-8">
        <div class="card shadow">
          <div class="card-body p-5">

            <h2 class="text-center mb-4">Login to Your Account</h2>

            <p class="text-center mb-4">
              Don't have an account?
              <a href="{% url 'signup' %}" class="text-primary">
                Sign up here
              </a>.
            </p>

            <form method="POST" class="login-form">
              {% csrf_token %}

              <div class="mb-3">
                <label for="email" class="form-label">Email:</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="email"
                  required
                >
              </div>

              <div class="mb-3">
                <label for="password" class="form-label">Password:</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  name="password"
                  required
                >
              </div>

              <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                  Login
                </button>
              </div>
            </form>

            {% if messages %}
              <div class="alert alert-danger mt-4">
                {% for message in messages %}
                  <p class="mb-0">{{ message }}</p>
                {% endfor %}
              </div>
            {% endif %}

          </div>
        </div>
      </div>
    </div>
  </div>
</section>


<style>
.notice-modal-content {
    min-height: 570px;
    border: none;
    border-radius: 22px;
    background-color: #ffffff;
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
}

.notice-modal-content .modal-title {
    font-size: clamp(1.8rem, 3vw, 2.5rem);
    font-weight: 500;
}

.notice-modal-content .modal-body {
    font-size: 1.08rem;
    line-height: 1.7;
}

.notice-confirm-button {
    width: min(100%, 320px);
    min-height: 52px;
    border-radius: 28px;
    font-size: 1.05rem;
}

.modal-backdrop.show {
    opacity: 0.8;
}

body.dark-mode #login-section,
body[data-theme="dark"] #login-section,
body.dark-mode .login-container,
body[data-theme="dark"] .login-container {
    background: #232323 !important;
    background-color: #232323 !important;
}

body.dark-mode .notice-modal-content,
body[data-theme="dark"] .notice-modal-content {
    background-color: #25272e;
    color: #f1f1f1;
}

@media (max-width: 767px) {
    .modal-dialog {
        margin: 16px;
    }

    .notice-modal-content {
        min-height: auto;
        max-height: calc(100vh - 32px);
        overflow-y: auto;
        border-radius: 16px;
    }
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const modalElement = document.getElementById("noticeModal");

    if (!modalElement) {
        console.error("Could not find an element with id='noticeModal'.");
        return;
    }

    if (typeof bootstrap === "undefined") {
        console.error("Bootstrap JavaScript has not been loaded.");
        return;
    }

    const noticeModal = bootstrap.Modal.getOrCreateInstance(modalElement, {
        backdrop: "static",
        keyboard: false
    });

    noticeModal.show();
});
</script>

{% endblock %}
